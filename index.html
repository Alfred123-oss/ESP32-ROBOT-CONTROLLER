<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Robot Controller</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      color: #333;
    }

    button {
      width: 120px;
      height: 50px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .fwd { background: #4CAF50; color: white; }
    .bwd { background: #f44336; color: white; }
    .left { background: #2196F3; color: white; }
    .right { background: #ff9800; color: white; }
    .stop { background: #000; color: white; }

    .panel { margin-top: 20px; }

    input[type=range] {
      width: 300px;
    }

    .info {
      margin-top: 20px;
      font-size: 18px;
      background: white;
      padding: 10px;
      display: inline-block;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>ESP32 4WD Robot Control Panel</h2>

<!-- CONTROL BUTTONS -->
<div class="panel">

  <button class="fwd" onclick="sendCommand('FORWARD')">Forward</button><br>

  <button class="left" onclick="sendCommand('LEFT')">Left</button>
  <button class="stop" onclick="sendCommand('STOP')">Stop</button>
  <button class="right" onclick="sendCommand('RIGHT')">Right</button><br>

  <button class="bwd" onclick="sendCommand('BACKWARD')">Backward</button>

</div>

<!-- SPEED CONTROL -->
<h3>Speed Control</h3>
<input type="range" min="0" max="255" value="200"
       oninput="updateSpeed(this.value)">
<p id="speedText">Speed: 200</p>

<!-- LIVE DATA -->
<div class="info">
  <p>📏 Distance: <span id="distance">--</span> cm</p>
  <p>⚙ Status: <span id="status">--</span></p>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

<script>

  // 🔥 YOUR FIREBASE CONFIG (REPLACED)
  const firebaseConfig = {
    apiKey: "AIzaSyD7hWG60J4Q4-V7PFPeJ1_-gt9LAzMpp_A",
    authDomain: "esp32dht-c8d04.firebaseapp.com",
    databaseURL: "https://esp32dht-c8d04-default-rtdb.firebaseio.com",
    projectId: "esp32dht-c8d04"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  // ---------------- SEND COMMAND ----------------
  function sendCommand(cmd) {
    db.ref("Robot").update({
      Command: cmd
    });
  }

  // ---------------- UPDATE SPEED ----------------
  function updateSpeed(val) {
    document.getElementById("speedText").innerText = "Speed: " + val;

    db.ref("Robot").update({
      Speed: parseInt(val)
    });
  }

  // ---------------- LIVE DISTANCE ----------------
  db.ref("Robot/Distance").on("value", (snapshot) => {
    document.getElementById("distance").innerText = snapshot.val();
  });

  // ---------------- LIVE STATUS ----------------
  db.ref("Robot/Status").on("value", (snapshot) => {
    document.getElementById("status").innerText = snapshot.val();
  });

</script>

</body>
</html>
