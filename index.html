<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 Robot Control Center</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:2.3rem;
}

.header p{
color:#94a3b8;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

.card h3{
margin-bottom:10px;
}

.value{
font-size:28px;
font-weight:bold;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.orange{
color:#f97316;
}

.blue{
color:#38bdf8;
}

.controls{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
}

.joystick{
display:flex;
flex-direction:column;
align-items:center;
margin-top:15px;
}

.row{
display:flex;
justify-content:center;
gap:10px;
margin:5px;
}

.btn{
width:90px;
height:60px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.forward{
background:#22c55e;
color:white;
}

.backward{
background:#ef4444;
color:white;
}

.left{
background:#3b82f6;
color:white;
}

.right{
background:#f97316;
color:white;
}

.stop{
background:#000;
color:white;
}

.slider-container{
margin-top:25px;
}

input[type=range]{
width:100%;
}

.warning{
display:none;
background:#7f1d1d;
padding:15px;
border-radius:10px;
margin-bottom:15px;
font-weight:bold;
text-align:center;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🤖 ESP32 Robot Control Center</h1>
<p>Firebase Cloud Controlled 4WD Robot</p>
</div>

<div class="warning" id="warning">
🚨 OBSTACLE DETECTED - ROBOT STOPPED
</div>

<div class="dashboard">

<div class="card">
<h3>📏 Distance</h3>
<div class="value orange" id="distance">0 cm</div>
</div>

<div class="card">
<h3>⚡ Speed</h3>
<div class="value blue" id="speedValue">200</div>
</div>

<div class="card">
<h3>🧭 Direction</h3>
<div class="value" id="direction">STOP</div>
</div>

<div class="card">
<h3>📡 Connection</h3>
<div class="value green" id="connection">Online</div>
</div>

<div class="card">
<h3>🤖 Status</h3>
<div class="value" id="status">Ready</div>
</div>

<div class="card">
<h3>🕒 Last Update</h3>
<div class="value" id="lastUpdate">--</div>
</div>

</div>

<div class="controls">

<h2>🎮 Robot Controls</h2>

<div class="joystick">

<div class="row">
<button class="btn forward"
onclick="sendCommand('FORWARD')">
⬆
</button>
</div>

<div class="row">

<button class="btn left"
onclick="sendCommand('LEFT')">
⬅
</button>

<button class="btn stop"
onclick="sendCommand('STOP')">
■
</button>

<button class="btn right"
onclick="sendCommand('RIGHT')">
➡
</button>

</div>

<div class="row">
<button class="btn backward"
onclick="sendCommand('BACKWARD')">
⬇
</button>
</div>

</div>

<div class="slider-container">

<h3>Motor Speed</h3>

<input
type="range"
min="0"
max="255"
value="200"
id="speedSlider">

</div>

</div>

<div class="footer">
Control Your Robot From Anywhere 🌍
</div>

</div>

<script>

//=====================================
// FIREBASE CONFIG
//=====================================

const firebaseConfig = {

apiKey: "AIzaSyCtmvzOghnnoGYMGGb9J8gBUC9UlMAnaw4",

authDomain: "esp32robot4wd.firebaseapp.com",

databaseURL:
"https://esp32robot4wd-default-rtdb.firebaseio.com",

projectId: "esp32robot4wd"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

//=====================================
// SEND COMMAND
//=====================================

function sendCommand(cmd)
{
db.ref("/Command").set(cmd);
}

//=====================================
// SPEED CONTROL
//=====================================

const slider =
document.getElementById("speedSlider");

slider.addEventListener("input",function(){

document.getElementById("speedValue")
.innerHTML=this.value;

db.ref("/Speed")
.set(parseInt(this.value));

});

//=====================================
// DISTANCE
//=====================================

db.ref("/Distance")
.on("value",(snap)=>{

let distance=snap.val();

document.getElementById("distance")
.innerHTML=distance+" cm";

if(distance < 20 && distance > 0)
{
document.getElementById("warning")
.style.display="block";
}
else
{
document.getElementById("warning")
.style.display="none";
}

});

//=====================================
// STATUS
//=====================================

db.ref("/Status")
.on("value",(snap)=>{

document.getElementById("status")
.innerHTML=snap.val();

});

//=====================================
// DIRECTION
//=====================================

db.ref("/Direction")
.on("value",(snap)=>{

document.getElementById("direction")
.innerHTML=snap.val();

});

//=====================================
// LAST UPDATE
//=====================================

db.ref("/LastUpdate")
.on("value",(snap)=>{

document.getElementById("lastUpdate")
.innerHTML=snap.val();

});

//=====================================
// CONNECTION
//=====================================

firebase.database()
.ref(".info/connected")
.on("value",(snap)=>{

let state=snap.val();

document.getElementById("connection")
.innerHTML=
state ? "🟢 Online" : "🔴 Offline";

});

</script>

</body>
</html>
