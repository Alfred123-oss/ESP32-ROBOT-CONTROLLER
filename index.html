<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 Smart Robot Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
text-align:center;
}

.value{
font-size:26px;
font-weight:bold;
}

.controls{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

button{
padding:15px 20px;
margin:5px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.forward{background:#22c55e;color:white;}
.backward{background:#ef4444;color:white;}
.left{background:#3b82f6;color:white;}
.right{background:#f97316;color:white;}
.stop{background:#000;color:white;}

.middle{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.slider{
width:100%;
margin-top:10px;
}

.alert{
display:none;
background:#7f1d1d;
padding:15px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🤖 ESP32 Smart Robot Dashboard</h1>

<div class="alert" id="alertBox">
🚨 OBSTACLE DETECTED — ROBOT STOPPED
</div>

<!-- DASHBOARD -->
<div class="grid">

<div class="card">
<h3>📏 Distance</h3>
<div class="value" id="distance">0 cm</div>
</div>

<div class="card">
<h3>⚡ Speed</h3>
<div class="value" id="speed">200</div>
</div>

<div class="card">
<h3>📡 Connection</h3>
<div class="value" id="connection">Connecting...</div>
</div>

<div class="card">
<h3>🤖 Status</h3>
<div class="value" id="status">Ready</div>
</div>

</div>

<!-- CONTROLS -->
<div class="controls">

<h2>🎮 Controls</h2>

<button class="forward" onclick="send('FORWARD')">⬆ Forward</button>

<div class="middle">

<button class="left" onclick="send('LEFT')">⬅ Left</button>
<button class="stop" onclick="send('STOP')">⏹ Stop</button>
<button class="right" onclick="send('RIGHT')">➡ Right</button>

</div>

<button class="backward" onclick="send('BACKWARD')">⬇ Backward</button>

<input type="range" min="0" max="255" value="200" id="slider" class="slider">

</div>

<script>

// ================= FIREBASE CONFIG =================
const firebaseConfig = {
apiKey: "AIzaSyD7hWG60J4Q4-V7PFPeJ1_-gt9LAzMpp_A",
authDomain: "esp32dht-c8d04.firebaseapp.com",
databaseURL: "https://esp32dht-c8d04-default-rtdb.firebaseio.com",
projectId: "esp32dht-c8d04"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= SEND COMMAND =================
function send(cmd){
db.ref("Robot").update({
Command: cmd
});
}

// ================= SPEED CONTROL =================
document.getElementById("slider").addEventListener("input",function(){
document.getElementById("speed").innerHTML=this.value;
db.ref("Robot").update({
Speed: parseInt(this.value)
});
});

// ================= DISTANCE =================
db.ref("Robot/Distance").on("value",snap=>{
let d=snap.val();
document.getElementById("distance").innerHTML=d+" cm";

if(d<20){
document.getElementById("alertBox").style.display="block";
}else{
document.getElementById("alertBox").style.display="none";
}
});

// ================= STATUS =================
db.ref("Robot/Status").on("value",snap=>{
document.getElementById("status").innerHTML=snap.val();
});

// ================= CONNECTION =================
firebase.database().ref(".info/connected").on("value",snap=>{
document.getElementById("connection").innerHTML=
snap.val()?"🟢 Online":"🔴 Offline";
});

</script>

<!--
================= WIRING REFERENCE (DEVELOPER ONLY) =================

ESP32 → L298N
GPIO25 → IN1
GPIO26 → IN2
GPIO27 → IN3
GPIO14 → IN4
GPIO32 → ENA
GPIO33 → ENB

L298N → MOTORS
OUT1+OUT2 → Left Motors
OUT3+OUT4 → Right Motors

POWER
12V Battery → L298N 12V
L298N GND → ESP32 GND (COMMON GROUND)
L298N 5V → ESP32 VIN (or buck converter)

ULTRASONIC
TRIG → GPIO5
ECHO → GPIO18
VCC → 5V
GND → GND
===============================================================
-->

</body>
</html>
